<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@atomchat.io/tokens@2.2.0/build/css/tokens.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@atomchat.io/css@1.2.0/dist/fonts.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@atomchat.io/css@1.2.0/dist/atom.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { padding: 0; font-family: system-ui, -apple-system, sans-serif; background: transparent; display: flex; align-items: flex-start; justify-content: center; }
    .sb-playground { display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 28px 24px; width: 100%; max-width: 560px; }
    .sb-separator { width: 100%; border: none; border-top: 1px solid var(--border-subtle, #e5e7eb); }
    .sb-controls { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .sb-control-row { display: flex; align-items: center; gap: 12px; }
    .sb-control-row label { font-size: 11px; font-weight: 600; color: var(--fg-subtle, #6b7280); width: 70px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.05em; }
    .sb-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .sb-chip { padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; border: 1px solid var(--border-default, #e5e7eb); background: var(--bg-primary, #fff); cursor: pointer; transition: border-color 0.12s, background 0.12s, color 0.12s; color: var(--fg-default, #374151); }
    .sb-chip:hover { border-color: #9ca3af; }
    .sb-chip.active { background: var(--fg-default, #111); color: var(--bg-primary, #fff); border-color: var(--fg-default, #111); }
    .sb-chip-bool { padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; border: 1px solid var(--border-default, #e5e7eb); background: var(--bg-primary, #fff); cursor: pointer; transition: border-color 0.12s, background 0.12s, color 0.12s; color: var(--fg-default, #374151); }
    .sb-chip-bool:hover { border-color: #9ca3af; }
    .sb-chip-bool.active { background: #ef4444; color: #fff; border-color: #ef4444; }
    body { display: block; }
    .sb-section { display: flex; flex-direction: column; gap: 8px; padding: 24px; }
    .sb-label { font-size: 11px; font-weight: 600; color: var(--fg-subtle, #6b7280); text-transform: uppercase; letter-spacing: 0.05em; padding: 0 4px; }
    .navbar-demo { position: relative; border-radius: 10px; overflow: hidden; border: 1px solid var(--border-subtle, #e5e7eb); }</style>
</head>
<body>
  <div class="sb-section">
    <p class="sb-label">Default</p>
    <div class="navbar-demo">
      <nav class="navbar" data-navbar>
        <div class="navbar__brand">
          <span style="font-weight:700;font-size:18px;color:var(--fg-default,#111);">ATOM</span>
        </div>
        <div class="navbar__links">
          <a class="nav-link nav-link--primary nav-link--m nav-link--active" href="#" data-nav-link aria-current="page" onclick="return false;">Home</a>
          <a class="nav-link nav-link--primary nav-link--m" href="#" data-nav-link onclick="return false;">Components</a>
          <a class="nav-link nav-link--primary nav-link--m" href="#" data-nav-link onclick="return false;">Tokens</a>
          <a class="nav-link nav-link--primary nav-link--m" href="#" data-nav-link onclick="return false;">About</a>
        </div>
        <div class="navbar__actions">
          <button class="button button--primary button--s" data-button type="button">
            <span class="button__label-wrap"><span class="button__label">Get started</span><span class="button__label button__label--clone" aria-hidden="true">Get started</span></span>
          </button>
        </div>
      </nav>
    </div>

    <p class="sb-label" style="margin-top:16px;">Scrolled (with shadow)</p>
    <div class="navbar-demo">
      <nav class="navbar navbar--scrolled" data-navbar>
        <div class="navbar__brand">
          <span style="font-weight:700;font-size:18px;color:var(--fg-default,#111);">ATOM</span>
        </div>
        <div class="navbar__links">
          <a class="nav-link nav-link--primary nav-link--m nav-link--active" href="#" data-nav-link aria-current="page" onclick="return false;">Home</a>
          <a class="nav-link nav-link--primary nav-link--m" href="#" data-nav-link onclick="return false;">Components</a>
          <a class="nav-link nav-link--primary nav-link--m" href="#" data-nav-link onclick="return false;">Tokens</a>
          <a class="nav-link nav-link--primary nav-link--m" href="#" data-nav-link onclick="return false;">About</a>
        </div>
        <div class="navbar__actions">
          <button class="button button--primary button--s" data-button type="button">
            <span class="button__label-wrap"><span class="button__label">Get started</span><span class="button__label button__label--clone" aria-hidden="true">Get started</span></span>
          </button>
        </div>
      </nav>
    </div>

    <p class="sb-label" style="margin-top:16px;">Pill variant</p>
    <div class="navbar-demo" style="background:var(--bg-canvas,#f3f4f6);padding:12px;">
      <nav class="navbar navbar--pill" data-navbar>
        <div class="navbar__brand">
          <span style="font-weight:700;font-size:18px;color:var(--fg-default,#111);">ATOM</span>
        </div>
        <div class="navbar__links">
          <a class="nav-link nav-link--primary nav-link--m nav-link--active" href="#" data-nav-link aria-current="page" onclick="return false;">Home</a>
          <a class="nav-link nav-link--primary nav-link--m" href="#" data-nav-link onclick="return false;">Components</a>
          <a class="nav-link nav-link--primary nav-link--m" href="#" data-nav-link onclick="return false;">Tokens</a>
        </div>
        <div class="navbar__actions">
          <button class="button button--primary button--s" data-button type="button">
            <span class="button__label-wrap"><span class="button__label">Get started</span><span class="button__label button__label--clone" aria-hidden="true">Get started</span></span>
          </button>
        </div>
      </nav>
    </div>
  </div>
</body>
</html>
