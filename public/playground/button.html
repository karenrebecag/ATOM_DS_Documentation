<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@atomchat.io/tokens@2.2.0/build/css/tokens.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@atomchat.io/css@1.2.0/dist/fonts.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@atomchat.io/css@1.2.0/dist/atom.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { padding: 0; font-family: system-ui, -apple-system, sans-serif; background: transparent; display: flex; align-items: flex-start; justify-content: center; }
    .sb-playground { display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 28px 24px; width: 100%; max-width: 560px; }
    .sb-separator { width: 100%; border: none; border-top: 1px solid var(--border-subtle, #e5e7eb); }
    .sb-controls { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .sb-control-row { display: flex; align-items: center; gap: 12px; }
    .sb-control-row label { font-size: 11px; font-weight: 600; color: var(--fg-subtle, #6b7280); width: 70px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.05em; }
    .sb-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .sb-chip { padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; border: 1px solid var(--border-default, #e5e7eb); background: var(--bg-primary, #fff); cursor: pointer; transition: border-color 0.12s, background 0.12s, color 0.12s; color: var(--fg-default, #374151); }
    .sb-chip:hover { border-color: #9ca3af; }
    .sb-chip.active { background: var(--fg-default, #111); color: var(--bg-primary, #fff); border-color: var(--fg-default, #111); }
    .sb-chip-bool { padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; border: 1px solid var(--border-default, #e5e7eb); background: var(--bg-primary, #fff); cursor: pointer; transition: border-color 0.12s, background 0.12s, color 0.12s; color: var(--fg-default, #374151); }
    .sb-chip-bool:hover { border-color: #9ca3af; }
    .sb-chip-bool.active { background: #ef4444; color: #fff; border-color: #ef4444; }
    .sb-preview { min-height: 72px; display: flex; align-items: center; justify-content: center; width: 100%; border-radius: 10px; background: var(--bg-surface, #f9fafb); border: 1px solid var(--border-subtle, #e5e7eb); }</style>
</head>
<body>
  <div class="sb-playground">
    <div class="sb-preview" id="btn-preview"></div>
    <hr class="sb-separator"/>
    <div class="sb-controls">
      <div class="sb-control-row">
        <label>Variant</label>
        <div class="sb-chips" id="btn-variants"></div>
      </div>
      <div class="sb-control-row">
        <label>Size</label>
        <div class="sb-chips" id="btn-sizes"></div>
      </div>
      <div class="sb-control-row">
        <label>Options</label>
        <div class="sb-chips">
          <button class="sb-chip-bool" id="btn-loading">Loading</button>
          <button class="sb-chip-bool" id="btn-disabled">Disabled</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module">
    import { initRotateClones, initRotateCalc, initHoverRotate }
      from 'https://esm.sh/@atomchat.io/animations@1.4.0/hover';
    window.__atomAnimations = { initRotateClones, initRotateCalc, initHoverRotate };
    window.dispatchEvent(new CustomEvent('atom:animations-ready'));
  </script>
  <script>
  (function(){
    const VARIANTS = ['primary','secondary','tertiary','danger-primary','danger-secondary','danger-tertiary'];
    const SIZES    = ['xs','s','m','l','xl'];
    let state = { variant:'primary', size:'m', loading:false, disabled:false };
    let cleanupHover = null;

    function buildChips(id, items, activeIdx){
      document.getElementById(id).innerHTML = items.map((v,i)=>
        `<button class="sb-chip${i===activeIdx?' active':''}" data-value="${v}">${v}</button>`
      ).join('');
    }
    buildChips('btn-variants', VARIANTS, 0);
    buildChips('btn-sizes', SIZES, 2);

    function labelWrap(text){
      return `<span class="button__label-wrap"><span class="button__label" data-button-label>${text}</span><span class="button__label button__label--clone" data-button-label-clone aria-hidden="true">${text}</span></span>`;
    }

    function renderBtn(){
      const { variant, size, loading, disabled } = state;
      if(loading){
        return `<button class="button button--${variant} button--${size} button--loading" data-button aria-busy="true"><span class="button__loading-content"><span class="button__loading-text" data-shimmer>Loading</span><span class="button__spinner" data-button-spinner aria-hidden="true"></span></span></button>`;
      }
      const cls = `button button--${variant} button--${size}${disabled?' button--disabled':''}`;
      return `<button class="${cls}" data-button data-hover-rotate ${disabled?'disabled':''}>${labelWrap('Click me')}</button>`;
    }

    function update(){
      if(cleanupHover){ cleanupHover(); cleanupHover=null; }
      const preview = document.getElementById('btn-preview');
      preview.innerHTML = renderBtn();
      const anim = window.__atomAnimations;
      if(anim){
        anim.initRotateClones({scope:preview});
        anim.initRotateCalc({scope:preview});
        cleanupHover = anim.initHoverRotate({scope:preview});
      }
    }

    function bindChips(id,key){
      document.getElementById(id).addEventListener('click',e=>{
        const c=e.target.closest('.sb-chip'); if(!c)return;
        state[key]=c.dataset.value;
        document.querySelectorAll(`#${id} .sb-chip`).forEach(x=>x.classList.remove('active'));
        c.classList.add('active'); update();
      });
    }
    function bindBool(id,key){
      document.getElementById(id).addEventListener('click',e=>{
        state[key]=!state[key]; e.currentTarget.classList.toggle('active',state[key]); update();
      });
    }

    bindChips('btn-variants','variant'); bindChips('btn-sizes','size');
    bindBool('btn-loading','loading'); bindBool('btn-disabled','disabled');
    update();
    window.addEventListener('atom:animations-ready', update, {once:true});
  })();
  </script>
</body>
</html>
