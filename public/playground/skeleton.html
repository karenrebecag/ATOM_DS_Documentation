<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@atomchat.io/tokens@2.2.0/build/css/tokens.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@atomchat.io/css@1.2.0/dist/fonts.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@atomchat.io/css@1.2.0/dist/atom.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body { padding: 0; font-family: system-ui, -apple-system, sans-serif; background: transparent; display: flex; align-items: flex-start; justify-content: center; }
    .sb-playground { display: flex; flex-direction: column; align-items: center; gap: 24px; padding: 28px 24px; width: 100%; max-width: 560px; }
    .sb-separator { width: 100%; border: none; border-top: 1px solid var(--border-subtle, #e5e7eb); }
    .sb-controls { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .sb-control-row { display: flex; align-items: center; gap: 12px; }
    .sb-control-row label { font-size: 11px; font-weight: 600; color: var(--fg-subtle, #6b7280); width: 70px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.05em; }
    .sb-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .sb-chip { padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; border: 1px solid var(--border-default, #e5e7eb); background: var(--bg-primary, #fff); cursor: pointer; transition: border-color 0.12s, background 0.12s, color 0.12s; color: var(--fg-default, #374151); }
    .sb-chip:hover { border-color: #9ca3af; }
    .sb-chip.active { background: var(--fg-default, #111); color: var(--bg-primary, #fff); border-color: var(--fg-default, #111); }
    .sb-chip-bool { padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 500; border: 1px solid var(--border-default, #e5e7eb); background: var(--bg-primary, #fff); cursor: pointer; transition: border-color 0.12s, background 0.12s, color 0.12s; color: var(--fg-default, #374151); }
    .sb-chip-bool:hover { border-color: #9ca3af; }
    .sb-chip-bool.active { background: #ef4444; color: #fff; border-color: #ef4444; }
    .sb-playground { display: flex; flex-direction: column; gap: 24px; padding: 28px 24px; width: 100%; max-width: 480px; }
    .sb-section-label { font-size: 11px; font-weight: 600; color: var(--fg-subtle, #6b7280); text-transform: uppercase; letter-spacing: 0.05em; }
    .skeleton-card { display: flex; flex-direction: column; gap: 12px; padding: 16px; border-radius: 10px; background: var(--bg-surface, #f9fafb); border: 1px solid var(--border-subtle, #e5e7eb); }
    .skeleton-avatar-row { display: flex; gap: 12px; align-items: center; }
    .skeleton-lines { display: flex; flex-direction: column; gap: 8px; flex: 1; }</style>
</head>
<body>
  <div class="sb-playground">
    <p class="sb-section-label">Card skeleton</p>
    <div class="skeleton-card">
      <div class="skeleton skeleton--rect" data-skeleton style="height:120px;border-radius:8px;" aria-hidden="true"></div>
      <div class="skeleton skeleton--text" data-skeleton style="width:60%;height:20px;" aria-hidden="true"></div>
      <div class="skeleton skeleton--text" data-skeleton style="width:90%;height:14px;" aria-hidden="true"></div>
      <div class="skeleton skeleton--text" data-skeleton style="width:75%;height:14px;" aria-hidden="true"></div>
    </div>

    <p class="sb-section-label">Text lines</p>
    <div class="skeleton-card">
      <div class="skeleton skeleton--text" data-skeleton style="width:45%;height:22px;" aria-hidden="true"></div>
      <div class="skeleton skeleton--text" data-skeleton style="width:100%;height:14px;" aria-hidden="true"></div>
      <div class="skeleton skeleton--text" data-skeleton style="width:95%;height:14px;" aria-hidden="true"></div>
      <div class="skeleton skeleton--text" data-skeleton style="width:80%;height:14px;" aria-hidden="true"></div>
    </div>

    <p class="sb-section-label">Avatar + heading</p>
    <div class="skeleton-card">
      <div class="skeleton-avatar-row">
        <div class="skeleton skeleton--circle" data-skeleton style="width:48px;height:48px;flex-shrink:0;" aria-hidden="true"></div>
        <div class="skeleton-lines">
          <div class="skeleton skeleton--text" data-skeleton style="width:55%;height:18px;" aria-hidden="true"></div>
          <div class="skeleton skeleton--text" data-skeleton style="width:40%;height:13px;" aria-hidden="true"></div>
        </div>
      </div>
      <div class="skeleton skeleton--text" data-skeleton style="width:100%;height:14px;" aria-hidden="true"></div>
      <div class="skeleton skeleton--text" data-skeleton style="width:88%;height:14px;" aria-hidden="true"></div>
    </div>
  </div>
</body>
</html>
